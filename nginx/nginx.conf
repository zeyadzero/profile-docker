upstream vprofile_app {
    ip_hash;   # sticky sessions - same client always hits the same app instance
               # (the app doesn't share session state between instances,
               # same reasoning as the ALB target-group stickiness fix
               # used in the AWS version of this project)

    server app1:8080 max_fails=3 fail_timeout=10s;
    server app2:8080 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    # Hide the nginx version string from response headers/error pages
    server_tokens off;

    # Basic hardening headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Keep request bodies reasonably capped - mitigates naive DoS via
    # oversized uploads
    client_max_body_size 10m;

    location / {
        proxy_pass http://vprofile_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
